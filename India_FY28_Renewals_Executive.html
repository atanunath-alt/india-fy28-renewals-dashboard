<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India FY28 Key Renewals — Executive Dashboard</title>
<style>
:root {
  --surface: #fcfcfb;
  --page: #f0efec;
  --card: #ffffff;
  --border: #e1e0d9;
  --border-strong: #c3c2b7;
  --text-1: #0b0b0b;
  --text-2: #52514e;
  --text-muted: #898781;
  --grid: #e8e7e0;

  --blue: #2a78d6;
  --aqua: #1baf7a;
  --yellow: #eda100;
  --green4: #008300;
  --violet: #4a3aa7;
  --red: #e34948;
  --magenta: #e87ba4;
  --orange: #eb6834;
  --gray-swatch: #c3c2b7;

  --good: #0ca30c;
  --warning: #fab219;
  --serious: #ec835a;
  --critical: #d03b3b;

  --fins: #2a78d6;
  --cmi: #1baf7a;
  --tmthre: #4a3aa7;
  --esmb: #eb6834;

  --r-norisk: #1baf7a;
  --r-adoption: #eda100;
  --r-bizchange: #e34948;
  --r-financial: #eb6834;
  --r-impl: #4a3aa7;
  --r-unknown: #c3c2b7;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  background: var(--page);
  color: var(--text-1);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ─── HEADER ─── */
.dash-header {
  background: var(--text-1);
  color: #fff;
  padding: 18px 32px 16px;
  display: flex;
  align-items: baseline;
  gap: 16px;
}
.dash-header h1 { font-size: 18px; font-weight: 600; letter-spacing: -.01em; }
.dash-header .sub { font-size: 12px; color: #c3c2b7; margin-left: auto; }
.dash-header .badge-india {
  background: var(--blue);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 3px;
  letter-spacing: .04em;
  text-transform: uppercase;
}

/* ─── TAB NAV ─── */
.tab-nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  padding: 0 32px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.tab-btn {
  padding: 13px 20px 11px;
  border: none;
  border-bottom: 3px solid transparent;
  background: none;
  font: inherit;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: color .15s, border-color .15s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text-1); }
.tab-btn.active {
  color: var(--blue);
  border-bottom-color: var(--blue);
}
.tab-btn .tab-count {
  display: inline-block;
  background: var(--page);
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  padding: 1px 6px;
  margin-left: 6px;
  color: var(--text-2);
}

/* ─── TAB CONTENT ─── */
.tab-pane { display: none; padding: 28px 32px 48px; }
.tab-pane.active { display: block; }

/* ─── SUMMARY STRIP ─── */
.summary-strip {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}
.kpi-tile {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 18px;
}
.kpi-tile .kpi-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 5px;
}
.kpi-tile .kpi-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-1);
  letter-spacing: -.02em;
  line-height: 1.1;
}
.kpi-tile .kpi-sub {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 3px;
}
.kpi-tile.good .kpi-value { color: var(--good); }
.kpi-tile.warn .kpi-value { color: var(--critical); }

/* ─── SEGMENT CARD ─── */
.seg-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 20px;
  overflow: hidden;
}
.seg-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}
.seg-header:hover { background: #fafaf8; }
.seg-pill {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 4px;
  color: #fff;
  flex-shrink: 0;
}
.seg-name { font-size: 15px; font-weight: 600; }
.seg-kpis {
  display: flex;
  gap: 24px;
  margin-left: auto;
  align-items: center;
}
.seg-kpi { text-align: right; }
.seg-kpi .val { font-size: 16px; font-weight: 700; }
.seg-kpi .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); }
.seg-chevron {
  color: var(--text-muted);
  font-size: 16px;
  transition: transform .2s;
  flex-shrink: 0;
}
.seg-card.open .seg-chevron { transform: rotate(180deg); }
.seg-body { display: none; }
.seg-card.open .seg-body { display: block; }

/* ─── STACKED BAR ─── */
.bar-section {
  padding: 16px 20px 14px;
  border-bottom: 1px solid var(--border);
  background: #fafaf9;
}
.bar-section .bar-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.stacked-bar {
  display: flex;
  height: 28px;
  border-radius: 5px;
  overflow: hidden;
  background: var(--page);
  gap: 2px;
}
.bar-seg {
  height: 100%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: filter .15s;
  cursor: default;
  min-width: 2px;
  border-radius: 2px;
}
.bar-seg:hover { filter: brightness(1.08); }
.bar-seg .bar-label {
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,.92);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 4px;
  pointer-events: none;
}
.bar-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 10px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-2);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.legend-val { font-weight: 600; }

/* ─── REASON GROUP ─── */
.reason-group {
  border-bottom: 1px solid var(--border);
}
.reason-group:last-child { border-bottom: none; }
.reason-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  cursor: pointer;
  user-select: none;
  transition: background .12s;
}
.reason-header:hover { background: #f8f8f6; }
.reason-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.reason-name { font-size: 13px; font-weight: 600; flex: 1; }
.reason-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
.reason-count {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--page);
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 600;
}
.reason-atr { font-size: 13px; font-weight: 700; min-width: 80px; text-align: right; }
.rag-badges { display: flex; gap: 5px; }
.rag-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 3px;
  color: #fff;
  letter-spacing: .02em;
}
.rag-badge.GREEN { background: var(--good); }
.rag-badge.AMBER { background: var(--warning); color: #3a2800; }
.rag-badge.RED { background: var(--critical); }
.rag-badge.NA { background: var(--gray-swatch); color: var(--text-2); }
.reason-chevron {
  color: var(--text-muted);
  font-size: 13px;
  transition: transform .2s;
  flex-shrink: 0;
}
.reason-group.open .reason-chevron { transform: rotate(180deg); }
.account-table-wrap { display: none; padding: 0 20px 16px; }
.reason-group.open .account-table-wrap { display: block; }

/* ─── ACCOUNT TABLE ─── */
.acct-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}
.acct-table th {
  text-align: left;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 6px 10px 6px 0;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.acct-table td {
  padding: 8px 10px 8px 0;
  border-bottom: 1px solid var(--grid);
  vertical-align: top;
}
.acct-table tr:last-child td { border-bottom: none; }
.acct-table tr:hover td { background: #f8f8f6; }
.acct-name { font-weight: 600; color: var(--text-1); }
.acct-cloud {
  display: inline-block;
  font-size: 10.5px;
  color: var(--text-2);
  background: var(--page);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  white-space: nowrap;
}
.atr-cell { font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
.shelf-cell { font-variant-numeric: tabular-nums; }
.shelf-high { color: var(--critical); font-weight: 600; }
.shelf-mid { color: var(--warning); font-weight: 600; color: #7a5800; }
.close-cell { color: var(--text-2); white-space: nowrap; }
.comments-cell { color: var(--text-2); font-size: 11.5px; max-width: 260px; line-height: 1.4; }

/* ─── PRODUCT BREAKDOWN ─── */
.product-bar-section {
  padding: 14px 20px 14px;
  border-bottom: 1px solid var(--border);
  background: #f5f5f3;
}
.product-bar-section .bar-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 10px; }
.product-tiles {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
}
.product-tile {
  border-radius: 6px; padding: 6px 10px 5px;
  min-width: 80px; border: 1px solid transparent;
}
.product-tile .pt-name { font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; opacity: .85; margin-bottom: 2px; }
.product-tile .pt-atr  { font-size: 13px; font-weight: 700; line-height: 1; }
.product-tile .pt-pct  { font-size: 10px; opacity: .75; margin-top: 1px; }
.cloud-chip {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700; letter-spacing: .03em;
  padding: 2px 7px; border-radius: 3px; white-space: nowrap;
  color: #fff;
}
.cloud-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.7); }
.product-summary-strip {
  display: flex; flex-wrap: wrap; gap: 10px;
  padding: 16px 24px; background: var(--card);
  border-bottom: 1px solid var(--border);
  border-radius: 0;
}
.ps-tile {
  display: flex; flex-direction: column;
  padding: 10px 14px; border-radius: 7px; min-width: 100px;
}
.ps-tile .ps-name { font-size: 9.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; opacity: .8; margin-bottom: 3px; }
.ps-tile .ps-atr  { font-size: 15px; font-weight: 700; }
.ps-tile .ps-pct  { font-size: 10px; opacity: .7; margin-top: 1px; }
.reason-cloud-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; padding: 0 20px 10px; }

/* ─── NORISK HIGHLIGHT ─── */
.reason-group.norisk .reason-header {
  background: #f0faf5;
}
.reason-group.norisk .reason-header:hover { background: #e8f7f1; }
.reason-group.norisk .reason-name { color: #006b40; }

/* ─── TOOLTIP ─── */
#tooltip {
  position: fixed;
  background: #1a1a19;
  color: #fff;
  font-size: 12px;
  padding: 8px 12px;
  border-radius: 6px;
  pointer-events: none;
  z-index: 9999;
  display: none;
  max-width: 220px;
  line-height: 1.5;
  box-shadow: 0 4px 16px rgba(0,0,0,.25);
}
#tooltip .tt-reason { font-weight: 700; margin-bottom: 2px; }
#tooltip .tt-val { color: #c3c2b7; }

/* ─── EXEC SUMMARY ─── */
.exec-section { margin-bottom: 28px; }
.exec-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: var(--text-muted);
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.exec-section-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* Narrative card */
.narrative-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 22px 26px; line-height: 1.75;
}
.narrative-card p { color: var(--text-2); font-size: 13.5px; margin-bottom: 10px; }
.narrative-card p:last-child { margin-bottom: 0; }
.narrative-card strong { color: var(--text-1); }
.narrative-card .hl-green { color: #006b40; font-weight: 600; }
.narrative-card .hl-red { color: var(--critical); font-weight: 600; }
.narrative-card .hl-amber { color: #7a5800; font-weight: 600; }

/* Combined KPI strip */
.exec-kpi-strip {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 28px;
}
.exec-kpi {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px;
}
.exec-kpi.accent-green { border-left: 3px solid var(--good); }
.exec-kpi.accent-red   { border-left: 3px solid var(--critical); }
.exec-kpi.accent-blue  { border-left: 3px solid var(--blue); }
.exec-kpi .ek-label { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
.exec-kpi .ek-value { font-size: 19px; font-weight: 700; letter-spacing: -.02em; line-height: 1.1; }
.exec-kpi .ek-sub   { font-size: 10.5px; color: var(--text-muted); margin-top: 2px; }
.exec-kpi.accent-green .ek-value { color: var(--good); }
.exec-kpi.accent-red   .ek-value { color: var(--critical); }

/* Segment health matrix */
.seg-matrix {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
}
.seg-matrix-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.seg-matrix-header {
  padding: 10px 14px; display: flex; align-items: center; gap: 8px;
}
.seg-matrix-pill {
  font-size: 11px; font-weight: 700; letter-spacing: .05em;
  text-transform: uppercase; padding: 3px 9px; border-radius: 3px; color: #fff;
}
.seg-matrix-name { font-size: 11px; color: var(--text-2); font-weight: 500; }
.seg-matrix-body { padding: 12px 14px 14px; }
.seg-matrix-kpis { display: flex; gap: 16px; margin-bottom: 10px; }
.seg-matrix-kpi .smk-val { font-size: 15px; font-weight: 700; }
.seg-matrix-kpi .smk-lbl { font-size: 9.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); }
.mini-bar-wrap { height: 8px; border-radius: 3px; background: var(--page); overflow: hidden; display: flex; gap: 1px; }
.mini-bar-seg { height: 100%; border-radius: 2px; }
.seg-matrix-footer { margin-top: 8px; font-size: 11px; color: var(--text-2); }
.seg-matrix-footer .risk-tag {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 2px 6px; border-radius: 3px; margin-right: 4px; margin-top: 3px;
}
.risk-tag.r { background: #fde8e8; color: var(--critical); }
.risk-tag.a { background: #fef5e0; color: #7a5800; }
.risk-tag.g { background: #e8f7f1; color: #006b40; }

/* Hotspot table */
.hotspot-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
}
.hotspot-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.hotspot-table th {
  text-align: left; font-size: 10.5px; font-weight: 700; letter-spacing: .05em;
  text-transform: uppercase; color: var(--text-muted); padding: 10px 14px;
  border-bottom: 1px solid var(--border); background: #fafaf9; white-space: nowrap;
}
.hotspot-table td { padding: 10px 14px; border-bottom: 1px solid var(--grid); vertical-align: middle; }
.hotspot-table tr:last-child td { border-bottom: none; }
.hotspot-table tr:hover td { background: #f8f8f6; }
.ht-account { font-weight: 600; }
.ht-atr { font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
.ht-comment { font-size: 11.5px; color: var(--text-2); }
.severity-dot {
  width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0;
}

/* Trend cards */
.trends-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.trend-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 18px;
}
.trend-icon { font-size: 20px; margin-bottom: 8px; }
.trend-title { font-size: 13px; font-weight: 700; color: var(--text-1); margin-bottom: 6px; }
.trend-body { font-size: 12.5px; color: var(--text-2); line-height: 1.6; }
.trend-body strong { color: var(--text-1); }
.trend-card.warn { border-left: 3px solid var(--critical); }
.trend-card.info { border-left: 3px solid var(--blue); }
.trend-card.good { border-left: 3px solid var(--good); }
.trend-card.amber { border-left: 3px solid var(--warning); }

/* ─── RESPONSIVE ─── */
@media (max-width: 900px) {
  .summary-strip { grid-template-columns: repeat(3, 1fr); }
  .seg-kpis { gap: 14px; }
  .tab-pane { padding: 20px 16px 40px; }
  .tab-nav { padding: 0 16px; }
  .dash-header { padding: 14px 16px; }
}
@media (max-width: 600px) {
  .summary-strip { grid-template-columns: 1fr 1fr; }
  .reason-meta { gap: 8px; }
  .acct-table th:nth-child(6),
  .acct-table td:nth-child(6) { display: none; }
}
</style>
</head>
<body>

<div id="tooltip"><div class="tt-reason"></div><div class="tt-val"></div></div>

<header class="dash-header">
  <span class="badge-india">India</span>
  <h1>FY28 Key Renewals — Executive Dashboard</h1>
  <span class="sub">July 2026 MBR &nbsp;·&nbsp; All figures in USD</span>
</header>

<nav class="tab-nav" role="tablist">
  <button class="tab-btn active" role="tab" onclick="switchTab(0, this)" id="tab-btn-0">
    ★ Executive Summary
  </button>
  <button class="tab-btn" role="tab" onclick="switchTab(1, this)" id="tab-btn-1">
    Top Accounts
    <span class="tab-count" id="tc1"></span>
  </button>
  <button class="tab-btn" role="tab" onclick="switchTab(2, this)" id="tab-btn-2">
    Non-Core Accounts
    <span class="tab-count" id="tc2"></span>
  </button>
</nav>

<div class="tab-pane active" id="pane-0" role="tabpanel"></div>
<div class="tab-pane" id="pane-1" role="tabpanel"></div>
<div class="tab-pane" id="pane-2" role="tabpanel"></div>

  if (c.includes('Mktg') || c === 'MC') return 'Mktg Cloud';
  if (c === 'Slack') return 'Slack';
  if (c.includes('Commerce') || c.includes('B2B')) return 'Commerce';
  if (c.includes('Data')) return 'Data Cloud';
  return 'Other';
}
function cloudBreakdown(accounts) {
  const map = {};
  accounts.forEach(a => {
    const k = normalizeCloud(a.cloud);
    map[k] = (map[k]||0) + a.atr;
  });
  return map;
}

function fmtAtr(v) {
  if (v >= 1e6) return '$' + (v/1e6).toFixed(2) + 'M';
  if (v >= 1e3) return '$' + Math.round(v/1e3) + 'K';
  return '$' + Math.round(v);
}
function fmtPct(v) { return (v*100).toFixed(0) + '%'; }
function shelfClass(v) {
  if (v >= 0.5) return 'shelf-high';
  if (v >= 0.25) return 'shelf-mid';
  return '';
}

// ─── TOOLTIP ─────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
function showTip(e, html) {
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  const x = e.clientX + 14, y = e.clientY - 12;
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  tooltip.style.left = (x + tw > window.innerWidth ? x - tw - 28 : x) + 'px';
  tooltip.style.top  = (y + th > window.innerHeight ? y - th - 4 : y) + 'px';
}
function hideTip() { tooltip.style.display = 'none'; }
document.addEventListener('mousemove', e => { if(tooltip.style.display==='block') moveTip(e); });

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderTab(data, pane, minLabel) {
  let totalAtr = 0, totalCount = 0, noRiskAtr = 0, noRiskCount = 0;
  data.forEach(seg => {
    totalAtr += seg.total_atr;
    totalCount += seg.total_count;
    seg.attrition_groups.forEach(g => {
      if (g.reason === 'No Risk') { noRiskAtr += g.atr; noRiskCount += g.count; }
    });
  });
  const atRiskAtr = totalAtr - noRiskAtr;
  const atRiskCount = totalCount - noRiskCount;

  // Tab-level cloud breakdown
  const tabAllAccounts = data.flatMap(seg => seg.attrition_groups.flatMap(g => g.accounts));
  const tabCloud = cloudBreakdown(tabAllAccounts);
  const tabCloudTiles = CLOUD_ORDER
    .filter(c => tabCloud[c])
    .map(c => {
      const col = CLOUD_COLOR[c];
      const pct = fmtPct(tabCloud[c]/totalAtr);
      return `<div class="ps-tile" style="background:${col}18;border:1px solid ${col}35;">
        <div class="ps-name" style="color:${col}">${c}</div>
        <div class="ps-atr" style="color:${col}">${fmtAtr(tabCloud[c])}</div>
        <div class="ps-pct" style="color:${col}">${pct} of portfolio</div>
      </div>`;
    }).join('');

  let html = `
  <div class="summary-strip">
    <div class="kpi-tile">
      <div class="kpi-label">Total Portfolio ATR</div>
      <div class="kpi-value">${fmtAtr(totalAtr)}</div>
      <div class="kpi-sub">${totalCount} accounts &nbsp;·&nbsp; ${minLabel} threshold</div>
    </div>
    <div class="kpi-tile good">
      <div class="kpi-label">No-Risk ATR</div>
      <div class="kpi-value">${fmtAtr(noRiskAtr)}</div>
      <div class="kpi-sub">${noRiskCount} accounts &nbsp;·&nbsp; ${fmtPct(noRiskAtr/totalAtr)} of portfolio</div>
    </div>
    <div class="kpi-tile">
      <div class="kpi-label">No-Risk %</div>
      <div class="kpi-value">${fmtPct(noRiskAtr/totalAtr)}</div>
      <div class="kpi-sub">by ATR value</div>
    </div>
    <div class="kpi-tile warn">
      <div class="kpi-label">At-Risk ATR</div>
      <div class="kpi-value">${fmtAtr(atRiskAtr)}</div>
      <div class="kpi-sub">${atRiskCount} accounts &nbsp;·&nbsp; ${fmtPct(atRiskAtr/totalAtr)} of portfolio</div>
    </div>
    <div class="kpi-tile">
      <div class="kpi-label">Segments</div>
      <div class="kpi-value">${data.length}</div>
      <div class="kpi-sub">${data.map(d=>d.segment).join(' · ')}</div>
    </div>
  </div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:20px;overflow:hidden;">
    <div style="padding:10px 20px 6px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border);">Product Mix — ATR by Cloud</div>
    <div class="product-summary-strip">${tabCloudTiles}</div>
  </div>`;

  data.forEach((seg, si) => {
    const segNoRiskAtr = seg.attrition_groups.find(g=>g.reason==='No Risk')?.atr || 0;
    const noRiskPct = segNoRiskAtr / seg.total_atr;
    const color = SEG_COLOR[seg.segment] || '#2a78d6';
    const cardId = `seg-${pane.id}-${si}`;

    // Stacked bar (by attrition reason)
    const barSegs = seg.attrition_groups.map(g => {
      const w = (g.atr / seg.total_atr * 100).toFixed(2);
      const c = REASON_COLOR[g.reason] || '#c3c2b7';
      const lbl = w > 8 ? REASON_SHORT[g.reason] : '';
      return `<div class="bar-seg" style="width:${w}%;background:${c};"
        onmouseenter="showTip(event,'<div class=\\'tt-reason\\'>${g.reason}</div><div class=\\'tt-val\\'>${fmtAtr(g.atr)} · ${g.count} account${g.count>1?'s':''} · ${fmtPct(g.atr/seg.total_atr)}</div>')"
        onmouseleave="hideTip()">
        ${lbl ? `<span class="bar-label">${lbl}</span>` : ''}
      </div>`;
    }).join('');

    // Legend (attrition reason)
    const legendItems = seg.attrition_groups.map(g => {
      const c = REASON_COLOR[g.reason] || '#c3c2b7';
      return `<div class="legend-item">
        <div class="legend-dot" style="background:${c}"></div>
        ${REASON_SHORT[g.reason]} <span class="legend-val">${fmtAtr(g.atr)}</span>
      </div>`;
    }).join('');

    // Product bar (by cloud) for this segment
    const segAllAccounts = seg.attrition_groups.flatMap(g => g.accounts);
    const segCloud = cloudBreakdown(segAllAccounts);
    const productBarSegs = CLOUD_ORDER
      .filter(c => segCloud[c])
      .map(c => {
        const w = (segCloud[c]/seg.total_atr*100).toFixed(2);
        const col = CLOUD_COLOR[c];
        const lbl = w > 9 ? c : '';
        return `<div class="bar-seg" style="width:${w}%;background:${col};"
          onmouseenter="showTip(event,'<div class=\\'tt-reason\\'>${c}</div><div class=\\'tt-val\\'>${fmtAtr(segCloud[c])} · ${fmtPct(segCloud[c]/seg.total_atr)}</div>')"
          onmouseleave="hideTip()">
          ${lbl ? `<span class="bar-label">${lbl}</span>` : ''}
        </div>`;
      }).join('');

    const productTiles = CLOUD_ORDER
      .filter(c => segCloud[c])
      .map(c => {
        const col = CLOUD_COLOR[c];
        return `<div class="product-tile" style="background:${col}15;border-color:${col}30;">
          <div class="pt-name" style="color:${col}">${c}</div>
          <div class="pt-atr" style="color:${col}">${fmtAtr(segCloud[c])}</div>
          <div class="pt-pct" style="color:${col}">${fmtPct(segCloud[c]/seg.total_atr)}</div>
        </div>`;
      }).join('');

    // Reason groups
    const reasonGroups = seg.attrition_groups.map((g, gi) => {
      const isNoRisk = g.reason === 'No Risk';
      const groupId = `rg-${pane.id}-${si}-${gi}`;
      const ragBadges = Object.entries(g.rag_counts)
        .filter(([k,v])=>v>0)
        .map(([k,v]) => `<span class="rag-badge ${k==='N/A'?'NA':k}">${k} ×${v}</span>`)
        .join('');

      // Cloud chips for this reason group
      const gCloud = cloudBreakdown(g.accounts);
      const cloudChips = CLOUD_ORDER
        .filter(c => gCloud[c])
        .map(c => {
          const col = CLOUD_COLOR[c];
          return `<span class="cloud-chip" style="background:${col};"
            onmouseenter="showTip(event,'<div class=\\'tt-reason\\'>${c}</div><div class=\\'tt-val\\'>${fmtAtr(gCloud[c])} · ${fmtPct(gCloud[c]/g.atr)}</div>')"
            onmouseleave="hideTip()">
            <span class="cloud-dot"></span>${c}
          </span>`;
        }).join('');

      // Account rows
      const rows = g.accounts.map(a => {
        const shelf = a.shelf_pct > 0 ? `<span class="${shelfClass(a.shelf_pct)}">${fmtPct(a.shelf_pct)}</span>` : '<span style="color:var(--text-muted)">—</span>';
        const ragBadge = a.rag ? `<span class="rag-badge ${a.rag}" style="font-size:9.5px">${a.rag}</span>` : '';
        const cn = normalizeCloud(a.cloud);
        const ccol = CLOUD_COLOR[cn] || '#999';
        return `<tr>
          <td><div class="acct-name">${a.name}</div></td>
          <td><span class="cloud-chip" style="background:${ccol};font-size:9.5px">${cn}</span>${a.cloud && a.cloud !== cn && !a.cloud.startsWith('Core') ? `<br><span style="font-size:10px;color:var(--text-muted)">${a.cloud}</span>` : ''}</td>
          <td class="atr-cell">${fmtAtr(a.atr)}</td>
          <td class="shelf-cell">${shelf}</td>
          <td class="close-cell">${a.close||'—'}</td>
          <td>${ragBadge}</td>
          <td class="comments-cell">${a.comments||''}</td>
        </tr>`;
      }).join('');

      return `<div class="reason-group${isNoRisk?' norisk':''}" id="${groupId}">
        <div class="reason-header" onclick="toggleGroup('${groupId}')">
          <div class="reason-dot" style="background:${REASON_COLOR[g.reason]||'#ccc'}"></div>
          <div class="reason-name">${g.reason}</div>
          <div class="reason-meta">
            <div style="display:flex;gap:4px;flex-wrap:wrap">${cloudChips}</div>
            <div class="rag-badges">${ragBadges}</div>
            <span class="reason-count">${g.count} acct${g.count>1?'s':''}</span>
            <div class="reason-atr">${fmtAtr(g.atr)}</div>
          </div>
          <span class="reason-chevron">▾</span>
        </div>
        <div class="account-table-wrap">
          <table class="acct-table">
            <thead><tr>
              <th>Account</th>
              <th>Cloud / Product</th>
              <th>ATR (USD)</th>
              <th>Shelf %</th>
              <th>Close</th>
              <th>RAG</th>
              <th>Comments</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
    }).join('');

    html += `
    <div class="seg-card" id="${cardId}">
      <div class="seg-header" onclick="toggleSeg('${cardId}')">
        <div class="seg-pill" style="background:${color}">${seg.segment}</div>
        <div>
          <div class="seg-name">${SEG_LABEL[seg.segment]||seg.segment}</div>
        </div>
        <div class="seg-kpis">
          <div class="seg-kpi">
            <div class="val">${fmtAtr(seg.total_atr)}</div>
            <div class="lbl">Total ATR</div>
          </div>
          <div class="seg-kpi">
            <div class="val">${seg.total_count}</div>
            <div class="lbl">Accounts</div>
          </div>
          <div class="seg-kpi">
            <div class="val" style="color:${noRiskPct>=0.7?'var(--good)':noRiskPct>=0.5?'var(--text-1)':'var(--critical)'}">${fmtPct(noRiskPct)}</div>
            <div class="lbl">No Risk</div>
          </div>
          <div class="seg-kpi" style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;max-width:160px;">
            ${CLOUD_ORDER.filter(c=>segCloud[c]).slice(0,4).map(c=>`<span class="cloud-chip" style="background:${CLOUD_COLOR[c]};font-size:9px">${c}</span>`).join('')}
          </div>
        </div>
        <span class="seg-chevron">▾</span>
      </div>
      <div class="seg-body">
        <div class="bar-section">
          <div class="bar-title">ATR by Attrition Reason</div>
          <div class="stacked-bar">${barSegs}</div>
          <div class="bar-legend">${legendItems}</div>
        </div>
        <div class="product-bar-section">
          <div class="bar-title">ATR by Cloud / Product</div>
          <div class="stacked-bar">${productBarSegs}</div>
          <div class="product-tiles">${productTiles}</div>
        </div>
        ${reasonGroups}
      </div>
    </div>`;
  });

  pane.innerHTML = html;

  // Auto-open all segments and No Risk groups
  data.forEach((seg, si) => {
    const cardId = `seg-${pane.id}-${si}`;
    const card = document.getElementById(cardId);
    if (card) {
      card.classList.add('open');
      // Auto-open No Risk group
      seg.attrition_groups.forEach((g, gi) => {
        if (g.reason === 'No Risk') {
          const groupId = `rg-${pane.id}-${si}-${gi}`;
          const grp = document.getElementById(groupId);
          if (grp) grp.classList.add('open');
        }
      });
    }
  });
}

function toggleSeg(id) {
  document.getElementById(id).classList.toggle('open');
}
function toggleGroup(id) {
  document.getElementById(id).classList.toggle('open');
}
function switchTab(n, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`pane-${n}`).classList.add('active');
}

// ─── EXEC SUMMARY ────────────────────────────────────────────────────────────
function renderExecSummary(pane) {
  const ALL = [...TAB1, ...TAB2.map(s => ({...s, _noncore: true}))];
  const SEGS = ['FINS','CMI','TMTHRE','ESMB'];
  const allAccounts = ALL.flatMap(seg => seg.attrition_groups.flatMap(g => g.accounts.map(a => ({...a, segment:seg.segment, reason:g.reason}))));

  // Combined totals
  let totalAtr=0, noRiskAtr=0, atRiskAtr=0, redAtr=0, amberAtr=0;
  let totalCount=0, noRiskCount=0, redCount=0, amberCount=0;
  const reasonAtr = {};
  ALL.forEach(seg => {
    totalAtr += seg.total_atr; totalCount += seg.total_count;
    seg.attrition_groups.forEach(g => {
      reasonAtr[g.reason] = (reasonAtr[g.reason]||0) + g.atr;
      if (g.reason==='No Risk') { noRiskAtr += g.atr; noRiskCount += g.count; }
      else { atRiskAtr += g.atr; }
      Object.entries(g.rag_counts).forEach(([k,v]) => {
        if (k==='RED')   { redAtr   += g.accounts.filter(a=>a.rag==='RED').reduce((s,a)=>s+a.atr,0); redCount+=v; }
        if (k==='AMBER') { amberAtr += g.accounts.filter(a=>a.rag==='AMBER').reduce((s,a)=>s+a.atr,0); amberCount+=v; }
      });
    });
  });
  const noRiskPct  = noRiskAtr/totalAtr;
  const atRiskPct  = atRiskAtr/totalAtr;

  // Per-segment combined
  const segMap = {};
  ALL.forEach(seg => {
    const k = seg.segment;
    if (!segMap[k]) segMap[k] = {segment:k, totalAtr:0, totalCount:0, attrition_groups:[]};
    segMap[k].totalAtr   += seg.total_atr;
    segMap[k].totalCount += seg.total_count;
    seg.attrition_groups.forEach(g => {
      const ex = segMap[k].attrition_groups.find(x=>x.reason===g.reason);
      if (ex) { ex.atr+=g.atr; ex.count+=g.count;
        Object.entries(g.rag_counts).forEach(([rk,rv])=>{ ex.rag_counts[rk]=(ex.rag_counts[rk]||0)+rv; });
        ex.accounts=[...ex.accounts,...g.accounts];
      } else {
        segMap[k].attrition_groups.push({...g, accounts:[...g.accounts], rag_counts:{...g.rag_counts}});
      }
    });
  });

  // Top RED hotspots across both tabs
  const allReds = [];
  ALL.forEach(seg => {
    seg.attrition_groups.forEach(g => {
      g.accounts.forEach(a => {
        if (a.rag==='RED' && a.atr > 0)
          allReds.push({...a, segment:seg.segment, reason:g.reason});
      });
    });
  });
  allReds.sort((a,b)=>b.atr-a.atr);
  const topReds = allReds.slice(0,10);

  // Top AMBER hotspots
  const allAmbers = [];
  ALL.forEach(seg => {
    seg.attrition_groups.forEach(g => {
      g.accounts.forEach(a => {
        if (a.rag==='AMBER' && a.atr > 0)
          allAmbers.push({...a, segment:seg.segment, reason:g.reason});
      });
    });
  });
  allAmbers.sort((a,b)=>b.atr-a.atr);
  const topAmbers = allAmbers.slice(0,8);

  // Shelfware watch (shelf_pct >= 0.3 at risk accounts)
  const highShelf = [];
  ALL.forEach(seg => {
    seg.attrition_groups.forEach(g => {
      if (g.reason==='No Risk') return;
      g.accounts.forEach(a => {
        if (a.shelf_pct >= 0.3) highShelf.push({...a, segment:seg.segment, reason:g.reason});
      });
    });
  });
  highShelf.sort((a,b)=>b.atr-a.atr);

  // Reason breakdown for mini bar
  const reasonOrder = ['No Risk','Adoption','Business Change and Distress','Financial & Contractual','Implementation','Unknown'];

  function segHealthBar(seg) {
    return reasonOrder.map(r => {
      const g = seg.attrition_groups.find(x=>x.reason===r);
      if (!g) return '';
      const w = (g.atr/seg.totalAtr*100).toFixed(1);
      return `<div class="mini-bar-seg" style="width:${w}%;background:${REASON_COLOR[r]||'#ccc'};flex-shrink:0;min-width:2px"></div>`;
    }).join('');
  }

  function segRiskTags(seg) {
    const red = seg.attrition_groups.filter(g=>g.reason!=='No Risk').flatMap(g=>g.accounts).filter(a=>a.rag==='RED');
    const amb = seg.attrition_groups.filter(g=>g.reason!=='No Risk').flatMap(g=>g.accounts).filter(a=>a.rag==='AMBER');
    const noCov = seg.attrition_groups.filter(g=>g.reason!=='No Risk').flatMap(g=>g.accounts).filter(a=>!a.rag);
    let out = '';
    if (red.length) out+=`<span class="risk-tag r">🔴 ${red.length} RED — ${fmtAtr(red.reduce((s,a)=>s+a.atr,0))}</span>`;
    if (amb.length) out+=`<span class="risk-tag a">🟡 ${amb.length} AMBER — ${fmtAtr(amb.reduce((s,a)=>s+a.atr,0))}</span>`;
    if (noCov.length) out+=`<span class="risk-tag a">⚪ ${noCov.length} unrated</span>`;
    return out || `<span class="risk-tag g">✓ All GREEN</span>`;
  }

  // Segment cards
  // ── Product / cloud analytics ──────────────────────────────────────────────
  // Full portfolio cloud breakdown
  const allCloud = cloudBreakdown(allAccounts);
  const noRiskCloud = cloudBreakdown(allAccounts.filter(a=>a.reason==='No Risk'));
  const atRiskCloud = cloudBreakdown(allAccounts.filter(a=>a.reason!=='No Risk'));

  // Per-cloud health: no-risk%, at-risk ATR, RED count
  const cloudHealth = {};
  CLOUD_ORDER.forEach(c => {
    const accts = allAccounts.filter(a=>normalizeCloud(a.cloud)===c);
    if (!accts.length) return;
    const totalC = accts.reduce((s,a)=>s+a.atr,0);
    const noRiskC = accts.filter(a=>a.reason==='No Risk').reduce((s,a)=>s+a.atr,0);
    const redC    = accts.filter(a=>a.rag==='RED' && a.reason!=='No Risk').reduce((s,a)=>s+a.atr,0);
    const amberC  = accts.filter(a=>a.rag==='AMBER' && a.reason!=='No Risk').reduce((s,a)=>s+a.atr,0);
    const redCount = accts.filter(a=>a.rag==='RED' && a.reason!=='No Risk').length;
    const amberCount = accts.filter(a=>a.rag==='AMBER' && a.reason!=='No Risk').length;
    cloudHealth[c] = { total:totalC, noRisk:noRiskC, atRisk:totalC-noRiskC, red:redC, amber:amberC, redCount, amberCount, nrPct:noRiskC/totalC };
  });

  // Per-cloud per-segment breakdown for the heatmap
  const cloudSegMatrix = {};
  CLOUD_ORDER.forEach(c => { cloudSegMatrix[c] = {}; SEGS.forEach(s => { cloudSegMatrix[c][s]=0; }); });
  allAccounts.forEach(a => {
    const c = normalizeCloud(a.cloud);
    const s = a.segment;
    if (cloudSegMatrix[c] && s) cloudSegMatrix[c][s] = (cloudSegMatrix[c][s]||0) + a.atr;
  });

  // Segment health matrix cards (built here so cloudSegMatrix is available)
  const segCards = SEGS.filter(s=>segMap[s]).map(s => {
    const seg = segMap[s];
    const nr = seg.attrition_groups.find(g=>g.reason==='No Risk');
    const nrPct = nr ? nr.atr/seg.totalAtr : 0;
    const color = SEG_COLOR[s]||'#999';
    // top cloud products for this segment
    const segCloudMap = {};
    CLOUD_ORDER.forEach(c => { if (cloudSegMatrix[c]&&cloudSegMatrix[c][s]) segCloudMap[c]=cloudSegMatrix[c][s]; });
    const topClouds = Object.entries(segCloudMap).sort((a,b)=>b[1]-a[1]).slice(0,3);
    const cloudChips = topClouds.map(([c,v])=>`<span class="cloud-chip" style="background:${CLOUD_COLOR[c]||'#999'};font-size:9px" title="${fmtAtr(v)}">${c}</span>`).join('');
    return `
    <div class="seg-matrix-card">
      <div class="seg-matrix-header" style="background:${color}18;border-bottom:1px solid ${color}30;">
        <span class="seg-matrix-pill" style="background:${color}">${s}</span>
        <span class="seg-matrix-name">${SEG_LABEL[s]||s}</span>
      </div>
      <div class="seg-matrix-body">
        <div class="seg-matrix-kpis">
          <div class="seg-matrix-kpi">
            <div class="smk-val">${fmtAtr(seg.totalAtr)}</div>
            <div class="smk-lbl">Total ATR</div>
          </div>
          <div class="seg-matrix-kpi">
            <div class="smk-val">${seg.totalCount}</div>
            <div class="smk-lbl">Accounts</div>
          </div>
          <div class="seg-matrix-kpi">
            <div class="smk-val" style="color:${nrPct>=0.7?'var(--good)':nrPct>=0.5?'var(--text-1)':'var(--critical)'}">${fmtPct(nrPct)}</div>
            <div class="smk-lbl">No Risk</div>
          </div>
        </div>
        <div class="mini-bar-wrap">${segHealthBar(seg)}</div>
        ${topClouds.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin:8px 0 4px">${cloudChips}</div>`:''}
        <div class="seg-matrix-footer">${segRiskTags(seg)}</div>
      </div>
    </div>`;
  }).join('');

  // Hotspot rows
  function hotspotRow(a, idx) {

          for standalone Tableau accounts with no adjacent cloud attach. Cross-sell motions
          (MuleSoft, MC) in these accounts would significantly strengthen renewal health.
        </div>
      </div>

      <div class="trend-card warn">
        <div class="trend-icon">🔗</div>
        <div class="trend-title">MuleSoft: Contractual Friction as the Risk Driver</div>
        <div class="trend-body">
          <span class="cloud-chip" style="background:${CLOUD_COLOR['MuleSoft']};font-size:10px">MuleSoft</span>
          represents <strong>${fmtAtr(allCloud['MuleSoft']||0)}</strong> ATR with an elevated at-risk share.
          <strong>Maruti Suzuki ($1.3M, AMBER)</strong> cites MuleSoft pricing as the driver;
          <strong>DLF ($504K, RED)</strong> lists Financial &amp; Contractual as the reason.
          Unlike adoption risk, contractual friction is recoverable with commercial intervention —
          a <strong>dedicated MuleSoft value play and contract renegotiation</strong> for these accounts
          is the recommended action before Q3 close.
        </div>
      </div>

      <div class="trend-card amber">
        <div class="trend-icon">📣</div>
        <div class="trend-title">Mktg Cloud: WhatsApp Pricing Threatening CMI Non-Core</div>
        <div class="trend-body">
          <span class="cloud-chip" style="background:${CLOUD_COLOR['Mktg Cloud']};font-size:10px">Mktg Cloud</span>
          at <strong>${fmtAtr(allCloud['Mktg Cloud']||0)}</strong> total ATR faces a structural pricing headwind.
          <strong>Lifestyle International ($331K) and BIBA Fashion ($282K)</strong> — both CMI Non-Core AMBER —
          explicitly cite <strong>WhatsApp pricing changes as the attrition trigger</strong>.
          This is a packaging issue, not a platform satisfaction issue.
          A bundled WhatsApp pricing concession or alternative messaging channel offer
          would recover <strong>$613K</strong> at risk and protect the segment's Mktg Cloud base.
        </div>
      </div>

      <div class="trend-card good">
        <div class="trend-icon">🚀</div>
        <div class="trend-title">TMTHRE Core: Best Breadth-to-Risk Ratio</div>
        <div class="trend-body">
          TMTHRE Core has 38 accounts at $16.3M with <strong>${fmtPct(12028737/16288026)} no-risk</strong>.
          Tata Communications ($2.0M), InMobi ($1.3M), EXL ($836K), Whatfix ($790K)
          show healthy adoption across Core SFA. Financial &amp; Contractual risk ($2.6M, 8 accounts)
          is manageable and largely Heroku-related — addressable with a platform migration offer.
        </div>
      </div>

      <div class="trend-card amber">
        <div class="trend-icon">⚡</div>
        <div class="trend-title">Q1 FY28 Close Urgency (Feb–May 2027)</div>
        <div class="trend-body">
          A significant volume of at-risk accounts close in <strong>Feb–May 2027</strong>:
          Pine Labs (May), Ola Electric (Apr), Hero MotoCorp (Apr), HDFC Bank (Jul),
          Bandhan Bank (Jun), UNext (Mar), Wingify (Feb).
          <strong>These are 90-day or sub-90-day deals</strong> — executive escalation and CSM
          acceleration are needed now to protect or mitigate this cohort before the window closes.

      </div>

    </div>
  </div>`;
