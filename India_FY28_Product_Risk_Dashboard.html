<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>India FY28 Key Renewals — Product Risk Dashboard</title>
<style>
:root {
  --surface:#fcfcfb;--page:#f0efec;--card:#ffffff;
  --border:#e1e0d9;--text-1:#0b0b0b;--text-2:#52514e;
  --text-muted:#898781;--grid:#e8e7e0;
  --good:#0ca30c;--warning:#fab219;--critical:#d03b3b;
  --blue:#2a78d6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--page);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text-1);font-size:13px;}
.dash-header{background:#1a1a2e;color:#fff;padding:16px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.dash-header h1{font-size:18px;font-weight:700;letter-spacing:-.3px;}
.badge-india{background:#e34948;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;letter-spacing:.5px;}
.dash-header .sub{color:#aaa;font-size:11px;margin-left:auto;}
.tab-nav{background:var(--card);border-bottom:2px solid var(--border);display:flex;gap:0;padding:0 24px;overflow-x:auto;}
.tab-btn{background:none;border:none;border-bottom:3px solid transparent;padding:12px 18px;font-size:13px;font-weight:600;color:var(--text-2);cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s;}
.tab-btn:hover{color:var(--text-1);}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);}
.tab-count{background:var(--grid);color:var(--text-2);font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:6px;}
.tab-pane{display:none;padding:20px 24px;}
.tab-pane.active{display:block;}

/* Segment cards */
.seg-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden;}
.seg-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;}
.seg-header:hover{background:#f7f6f3;}
.seg-pill{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.seg-name{font-weight:700;font-size:14px;flex:1;}
.seg-atr{font-weight:700;font-size:14px;color:var(--blue);}
.seg-count{color:var(--text-muted);font-size:12px;margin-left:4px;}
.seg-norisk{font-size:11px;color:var(--good);font-weight:700;margin-left:8px;}
.seg-chevron{color:var(--text-muted);font-size:12px;transition:transform .2s;flex-shrink:0;}
.seg-card.open .seg-chevron{transform:rotate(180deg);}
.seg-body{display:none;border-top:1px solid var(--border);}
.seg-card.open .seg-body{display:block;}

/* Stacked bar */
.stacked-bar{display:flex;border-radius:4px;overflow:hidden;height:8px;width:100%;min-width:80px;}
.bar-seg{position:relative;transition:opacity .15s;cursor:pointer;}
.bar-seg:hover{opacity:.82;}
.bar-label{position:absolute;left:4px;top:50%;transform:translateY(-50%);font-size:10px;color:#fff;font-weight:700;white-space:nowrap;pointer-events:none;}

/* RAG badges */
.rag-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;}
.rag-badge.RED{background:#fde8e8;color:#d03b3b;}
.rag-badge.AMBER{background:#fef5e0;color:#7a5800;}
.rag-badge.GREEN{background:#e8f7f1;color:#006b40;}
.rag-badge.NA{background:#f0efec;color:#898781;}

/* Cloud chip */
.cloud-chip{display:inline-block;font-size:9.5px;padding:2px 7px;border-radius:10px;color:#fff;font-weight:700;}

/* Risk group */
.risk-group{border-bottom:1px solid var(--grid);}
.risk-group:last-child{border-bottom:none;}
.risk-header{display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:pointer;background:#fafaf8;user-select:none;}
.risk-header:hover{background:#f3f2ef;}
.risk-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.risk-label{font-weight:600;font-size:12px;flex:1;}
.risk-atr{font-weight:700;font-size:12px;}
.risk-chevron{color:var(--text-muted);font-size:11px;transition:transform .2s;flex-shrink:0;}
.risk-group.open .risk-chevron{transform:rotate(180deg);}
.risk-body{display:none;}
.risk-group.open .risk-body{display:block;}

/* Account table */
.acct-table{width:100%;border-collapse:collapse;font-size:12px;}
.acct-table th{background:#f7f6f3;color:var(--text-muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px;padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);}
.acct-table td{padding:7px 10px;border-bottom:1px solid var(--grid);vertical-align:middle;}
.acct-table tr:last-child td{border-bottom:none;}
.acct-table tr:hover td{background:#f9f8f5;}
.acct-name{font-weight:600;color:var(--text-1);}
.comment-cell{color:var(--text-2);max-width:220px;font-size:11px;}
.shelf-high{color:#d03b3b;font-weight:700;}
.shelf-med{color:#7a5800;font-weight:600;}

/* KPI strip */
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px;}
.kpi-tile{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
.kpi-label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.kpi-val{font-size:22px;font-weight:700;color:var(--text-1);}
.kpi-sub{font-size:11px;color:var(--text-2);margin-top:3px;}

/* Section headings */
.section-title{font-size:14px;font-weight:700;color:var(--text-1);margin:20px 0 10px;border-left:3px solid var(--blue);padding-left:10px;}

/* Portfolio bar */
.portfolio-bar-wrap{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:14px;}
.portfolio-bar{display:flex;height:28px;border-radius:6px;overflow:hidden;margin:10px 0;}
.pb-seg{cursor:pointer;transition:opacity .15s;position:relative;}
.pb-seg:hover{opacity:.82;}
.legend-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.legend-chip{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-2);}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* Cloud health cards */
.cloud-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:18px;}
.cloud-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.cloud-card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.cloud-atr{font-size:16px;font-weight:700;}
.cloud-sub{font-size:11px;color:var(--text-2);}

/* Heatmap */
.heatmap-table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:18px;}
.heatmap-table th{background:#f7f6f3;color:var(--text-muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px;padding:8px 12px;text-align:center;border-bottom:1px solid var(--border);}
.heatmap-table th:first-child{text-align:left;}
.heatmap-table td{padding:8px 12px;text-align:center;border-bottom:1px solid var(--grid);font-size:12px;font-weight:600;}
.heatmap-table tr:last-child td{border-bottom:none;}
.heatmap-table td:first-child{text-align:left;font-weight:700;}
.hm-risk{font-size:10px;color:#d03b3b;display:block;font-weight:500;}

/* Narrative card */
.narrative-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px 20px;margin-bottom:18px;line-height:1.7;}
.narrative-card p{margin-bottom:10px;font-size:13px;color:var(--text-2);}
.narrative-card p:last-child{margin-bottom:0;}
.narrative-card strong{color:var(--text-1);}

/* Segment matrix */
.seg-matrix{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:18px;}
.seg-matrix-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
.sm-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sm-name{font-weight:700;font-size:13px;}
.sm-atr{font-size:18px;font-weight:700;margin-bottom:2px;}
.sm-sub{font-size:11px;color:var(--text-2);margin-bottom:8px;}

/* Hotspot tables */
.hotspot-table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:18px;font-size:12px;}
.hotspot-table th{background:#f7f6f3;color:var(--text-muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);}
.hotspot-table td{padding:8px 10px;border-bottom:1px solid var(--grid);vertical-align:middle;}
.hotspot-table tr:last-child td{border-bottom:none;}
.hotspot-table tr:hover td{background:#f9f8f5;}

/* Trend cards */
.trend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:18px;}
.trend-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;border-left:4px solid #ccc;}
.trend-card.warn{border-left-color:#d03b3b;}
.trend-card.amber{border-left-color:#fab219;}
.trend-card.good{border-left-color:#0ca30c;}
.trend-card.info{border-left-color:#2a78d6;}
.trend-title{font-weight:700;font-size:12px;margin-bottom:6px;}
.trend-body{font-size:11px;color:var(--text-2);line-height:1.6;}

/* Product tab */
.prod-cloud-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden;}
.prod-cloud-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;}
.prod-cloud-header:hover{background:#f7f6f3;}
.prod-cloud-body{display:none;border-top:1px solid var(--border);}
.prod-cloud-card.open .prod-cloud-body{display:block;}
.prod-cloud-card.open .prod-cloud-chevron{transform:rotate(180deg);}
.prod-cloud-chevron{color:var(--text-muted);font-size:12px;transition:transform .2s;flex-shrink:0;}

.prod-seg-group{border-bottom:1px solid var(--grid);}
.prod-seg-group:last-child{border-bottom:none;}
.prod-seg-header{display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:pointer;background:#fafaf8;user-select:none;}
.prod-seg-header:hover{background:#f3f2ef;}
.prod-seg-body{display:none;}
.prod-seg-group.open .prod-seg-body{display:block;}
.prod-seg-group.open .prod-seg-chevron{transform:rotate(180deg);}
.prod-seg-chevron{color:var(--text-muted);font-size:11px;transition:transform .2s;flex-shrink:0;}

.source-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;border:1px solid;}
.source-badge.core{background:#e8f0fd;color:#1a56b8;border-color:#c3d5f5;}
.source-badge.noncore{background:#fef5e0;color:#7a5800;border-color:#f5dfa0;}

.risk-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;color:#fff;}

.kpi-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:4px;}
.kpi-mini{text-align:center;}
.kpi-mini .val{font-size:15px;font-weight:700;}
.kpi-mini .lbl{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.3px;}
.count-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;}
.count-badge.red{background:#fde8e8;color:#d03b3b;}
.count-badge.amber{background:#fef5e0;color:#7a5800;}
</style>
</head>

const REASON_COLOR = {
  'No Risk': '#1baf7a',
  'Adoption': '#eda100',
  'Business Change and Distress': '#e34948',
  'Financial & Contractual': '#eb6834',
  'Implementation': '#4a3aa7',
  'Unknown': '#c3c2b7'
};
const SEG_COLOR = { FINS:'#2a78d6', CMI:'#1baf7a', TMTHRE:'#4a3aa7', ESMB:'#eb6834' };
const SEG_LABEL = { FINS:'Financial Services', CMI:'Consumer & Industrial', TMTHRE:'Tech, Media, Telecom & Healthcare', ESMB:'Enterprise SMB' };
const CLOUD_COLOR = {
  'Core SFA':'#2a78d6', 'Mktg Cloud':'#e87ba4', 'Tableau':'#eb6834',
  'MuleSoft':'#4a3aa7', 'Slack':'#1baf7a', 'Commerce':'#eda100',
  'Data Cloud':'#008300', 'Other':'#c3c2b7'
};
const CLOUD_ORDER = ['Core SFA','Tableau','Mktg Cloud','MuleSoft','Slack','Commerce','Data Cloud','Other'];
const SEGS = ['FINS','CMI','TMTHRE','ESMB'];

function fmtAtr(v) {
  if (v >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return '$' + Math.round(v/1e3) + 'K';
  return '$' + Math.round(v);
}
function fmtPct(v) { return (v*100).toFixed(0) + '%'; }
function normalizeCloud(c) {
  if (!c) return 'Other';
  if (c.startsWith('Core')) return 'Core SFA';
  if (c === 'Tableau') return 'Tableau';
  if (c === 'MuleSoft') return 'MuleSoft';
  if (c.includes('Mktg') || c === 'MC') return 'Mktg Cloud';
  if (c === 'Slack') return 'Slack';
  if (c.includes('Commerce') || c.includes('B2B')) return 'Commerce';
  if (c.includes('Data')) return 'Data Cloud';
  return 'Other';
}

function showTip(e, html) {
  const t = document.getElementById('tooltip');
  t.innerHTML = html; t.style.display='block';
  t.style.left = (e.pageX+12)+'px'; t.style.top = (e.pageY-10)+'px';
}
function hideTip() { document.getElementById('tooltip').style.display='none'; }
function toggleSeg(id) { document.getElementById(id).classList.toggle('open'); }
function toggleGroup(id) { document.getElementById(id).classList.toggle('open'); }
function switchTab(n, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-'+n).classList.add('active');
}
// ---- renderTab (Tabs 1 & 2) ----
function renderTab(data, pane, minLabel) {
  const REASON_ORDER = ['No Risk','Business Change and Distress','Financial & Contractual','Adoption','Implementation','Unknown'];
  let html = `<div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">Showing accounts ${minLabel} Core ATR. Click segment headers to expand/collapse.</div>`;
  data.forEach((seg, si) => {
    const segId = `seg-${pane.id}-${si}`;
    const noRiskGrp = seg.attrition_groups.find(g=>g.reason==='No Risk');
    const noRiskAtr = noRiskGrp ? noRiskGrp.atr : 0;
    const noRiskPct = seg.total_atr > 0 ? (noRiskAtr/seg.total_atr*100).toFixed(0) : 0;
    // count RED/AMBER
    let redCnt=0, amberCnt=0;
    seg.attrition_groups.forEach(g=>{
      if(g.rag_counts.RED) redCnt += g.rag_counts.RED;
      if(g.rag_counts.AMBER) amberCnt += g.rag_counts.AMBER;
    });
    // stacked bar
    const totalAtr = seg.total_atr;
    let barSegs = '';
    REASON_ORDER.forEach(r=>{
      const g = seg.attrition_groups.find(x=>x.reason===r);
      if(!g) return;
      const pct = (g.atr/totalAtr*100).toFixed(1);
      barSegs += `<div class="bar-seg" style="width:${pct}%;background:${REASON_COLOR[r]};min-width:${pct>0?'2px':'0'}" onmouseenter="showTip(event,'<b>${r}</b><br>${fmtAtr(g.atr)} (${pct}%)')" onmouseleave="hideTip()"></div>`;
    });
    html += `<div class="seg-card${si===0?' open':''}" id="${segId}">
      <div class="seg-header" onclick="toggleSeg('${segId}')">
        <span class="seg-pill" style="background:${SEG_COLOR[seg.segment]||'#888'}"></span>
        <span class="seg-name">${SEG_LABEL[seg.segment]||seg.segment}</span>
        <span class="seg-atr">${fmtAtr(seg.total_atr)}</span>
        <span class="seg-count">${seg.total_count} accounts</span>
        <span class="seg-norisk">${noRiskPct}% No-Risk</span>
        <div class="stacked-bar" style="width:120px;height:10px;">${barSegs}</div>
        ${redCnt>0?`<span class="count-badge red">${redCnt} RED</span>`:''}
        ${amberCnt>0?`<span class="count-badge amber">${amberCnt} AMBER</span>`:''}
        <span class="seg-chevron">&#9660;</span>
      </div>
      <div class="seg-body">`;
    // sort groups: No Risk first, then by ATR desc
    const sorted = [...seg.attrition_groups].sort((a,b)=>{
      if(a.reason==='No Risk') return -1;
      if(b.reason==='No Risk') return 1;
      return b.atr - a.atr;
    });
    sorted.forEach((grp, gi) => {
      const grpId = `rg-${pane.id}-${si}-${gi}`;
      const isAtRisk = grp.reason !== 'No Risk';
      const ragBreak = Object.entries(grp.rag_counts).map(([r,c])=>`<span class="rag-badge ${r}">${c} ${r}</span>`).join(' ');
      html += `<div class="risk-group${isAtRisk?' open':''}" id="${grpId}">
        <div class="risk-header" onclick="toggleGroup('${grpId}')">
          <span class="risk-dot" style="background:${REASON_COLOR[grp.reason]||'#999'}"></span>
          <span class="risk-label">${grp.reason}</span>
          <span style="color:var(--text-muted);font-size:11px;">${grp.count} accounts</span>
          <span class="risk-atr">${fmtAtr(grp.atr)}</span>
          <span style="display:flex;gap:4px;flex-wrap:wrap;">${ragBreak}</span>
          <span class="risk-chevron">&#9660;</span>
        </div>

  const atRiskAtr = totalAtr - noRiskAtr;
  const redAtr = allAccts.filter(a=>a.rag==='RED').reduce((s,a)=>s+a.atr,0);
  const amberAtr = allAccts.filter(a=>a.rag==='AMBER').reduce((s,a)=>s+a.atr,0);
  const bizChgAtr = allAccts.filter(a=>a.reason==='Business Change and Distress').reduce((s,a)=>s+a.atr,0);
  const adoptAtr = allAccts.filter(a=>a.reason==='Adoption').reduce((s,a)=>s+a.atr,0);
  const noRiskPct = (noRiskAtr/totalAtr*100).toFixed(0);
  const atRiskPct = (atRiskAtr/totalAtr*100).toFixed(0);

  // Cloud ATR map
  const cloudAtr = {};
  const cloudNoRisk = {};
  const cloudRed = {};
  const cloudAmber = {};
  allAccts.forEach(a => {

    cloudAtr[cl] = (cloudAtr[cl]||0) + a.atr;
    if(a.reason==='No Risk') cloudNoRisk[cl] = (cloudNoRisk[cl]||0) + a.atr;
    if(a.rag==='RED') cloudRed[cl] = (cloudRed[cl]||0) + 1;

    const sAccts = allAccts.filter(a=>a.segment===s);

    const sNR = sAccts.filter(a=>a.reason==='No Risk').reduce((x,a)=>x+a.atr,0);
    const sRed = sAccts.filter(a=>a.rag==='RED').length;
